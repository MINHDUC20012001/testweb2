<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiết Bị Spa Minh Bảo</title>

<style>
body{font-family:Arial;margin:0;background:#f4f6f8}
header{background:#0f172a;color:white;padding:20px}
header h2{margin:0}

nav{margin-top:10px;display:flex;gap:20px;align-items:center;flex-wrap:wrap}
nav a{color:white;text-decoration:none;font-weight:bold}

/* ✅ CHỈ SỬA Ở ĐÂY */
.menu-item{
position:relative;
padding-bottom:8px;
z-index:1000; /* fix đè lớp */
}

.dropdown{
position:absolute;
top:100%;
left:0;
background:#ffffff !important; /* trắng 100% */
border-radius:10px;
box-shadow:0 12px 25px rgba(0,0,0,0.3);
display:none;
min-width:180px;
padding-top:5px;
z-index:9999;
opacity:1;
}

.dropdown a{
display:block;
padding:10px 15px;
color:#111;
font-weight:normal
}

.dropdown a:hover{background:#f1f1f1}

.menu-item:hover .dropdown{display:block}

/* ===== PHẦN DƯỚI GIỮ NGUYÊN ===== */

.hero{background:linear-gradient(135deg,#111,#444);color:white;padding:80px 20px;text-align:center}
.hero h1{font-size:36px;margin-bottom:10px}

button{background:#e11d48;color:white;border:none;padding:12px 20px;border-radius:6px;cursor:pointer}

.section{padding:60px 20px;max-width:1200px;margin:auto}
.section h2{text-align:center;margin-bottom:40px}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px}

.card{background:white;border-radius:12px;padding:20px;box-shadow:0 6px 15px rgba(0,0,0,0.08);transition:0.2s}
.card:hover{transform:translateY(-5px)}

.price{color:#e11d48;font-weight:bold}

.service{background:white;border-radius:12px;padding:25px;box-shadow:0 6px 15px rgba(0,0,0,0.08)}

footer{background:#0f172a;color:white;text-align:center;padding:30px;margin-top:40px}

.contact-box{background:white;padding:30px;border-radius:12px;box-shadow:0 6px 15px rgba(0,0,0,0.08)}

.detail-page{display:none;padding:60px 20px;max-width:1200px;margin:auto}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;background:white;padding:30px;border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,0.08)}
.detail-img{width:100%;border-radius:10px}

</style>
</head>

<body>

<header>
<h2>Minh Bảo - Thiết Bị Spa & Thẩm Mỹ</h2>

<nav>
<a href="#home">Trang chủ</a>

<div class="menu-item">
<a href="#trietlong">Máy triệt lông ▾</a>
<div class="dropdown">
<a href="#trietlong">IPL</a>
<a href="#trietlong">OPT</a>
<a href="#trietlong">Diode Laser</a>
<a href="#trietlong">SHR</a>
</div>
</div>

<div class="menu-item">
<a href="#laser">Laser thẩm mỹ ▾</a>
<div class="dropdown">
<a href="#laser">Q-Switch ND YAG</a>
<a href="#laser">CO2 Fractional</a>
<a href="#laser">Laser Pico</a>
<a href="#laser">Laser trị nám</a>
</div>
</div>

<a href="#lienhe">Liên hệ</a>
</nav>
</header>

<div id="home" class="hero">
<h1>Cung cấp thiết bị spa chuyên nghiệp</h1>
<p>Máy mới - Máy thanh lý 90-98% - Bảo hành dài hạn</p>
<a href="#lienhe"><button>Liên hệ tư vấn ngay</button></a>
</div>

<!-- giữ nguyên các section của bạn -->

</body>
</html>
