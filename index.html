<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiết Bị Spa Minh Bảo</title>

<style>
body{font-family:Arial;margin:0;background:#f4f6f8; padding-bottom: 80px;}
header{background:#0f172a;color:white;padding:20px; position: sticky; top:0; z-index:1000}
header h2{margin:0}

/* MENU */
nav{margin-top:10px;display:flex;gap:20px;align-items:center;flex-wrap:wrap}
nav a{color:white;text-decoration:none;font-weight:bold;font-size:14px;}

/* HERO / SLIDESHOW */
.hero{background:linear-gradient(135deg,#111,#444);color:white;padding:60px 20px;text-align:center; position: relative; overflow: hidden; height: 250px; display: flex; align-items: center; justify-content: center; flex-direction: column;}
.slide-img {position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; opacity: 0.5; display: none;}

/* SECTION */
.section{padding:40px 20px;max-width:1200px;margin:auto}
.section h2{text-align:center;margin-bottom:30px; color: #0f172a; border-bottom: 2px solid #e11d48; display: inline-block; padding-bottom: 5px;}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px}

/* CARD */
.card{background:white;border-radius:12px;padding:15px;box-shadow:0 6px 15px rgba(0,0,0,0.08); position: relative;}
.card img{width:100%; height:200px; object-fit:cover; border-radius:8px; margin-bottom:10px;}
.price{color:#e11d48;font-weight:bold}
.btn-del {position: absolute; top: 5px; right: 5px; background: red; color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer;}

/* BUTTON */
button{background:#e11d48;color:white;border:none;padding:12px 20px;border-radius:6px;cursor:pointer}

/* DETAIL PAGE */
.detail-page{display:none;padding:60px 20px;max-width:1200px;margin:auto}

/* ADMIN POPUP */
#adminPopup {
    display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: white; padding: 20px; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.5);
    z-index: 10001; width: 90%; max-width: 400px;
}
input, textarea, select { width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }

/* CONTACT BUTTONS */
.contact-buttons { position: fixed; bottom: 20px; left: 10px; right: 10px; display: flex; gap: 10px; z-index: 9999; }
.btn-call, .btn-zalo { flex: 1; display: flex; align-items: center; justify-content: center; padding: 15px; border-radius: 50px; color: white; text-decoration: none; font-weight: bold; }
.btn-call { background: #e11d48; }
.btn-zalo { background: #0084ff; }

footer{background:#0f172a;color:white;text-align:center;padding:30px;margin-top:40px}
</style>
</head>

<body>

<header>
    <h2>Minh Bảo Spa</h2>
    <nav>
        <a href="#home" onclick="closeDetail()">Trang chủ</a>
        <a href="#trietlong" onclick="closeDetail()">Máy triệt lông</a>
        <a href="#laser" onclick="closeDetail()">Laser</a>
        <a href="#giambeo" onclick="closeDetail()">Giảm béo</a>
        <a href="#thanhly" onclick="closeDetail()">Thanh lý</a>
        <a href="#suamay" onclick="closeDetail()">Sửa máy</a>
    </nav>
</header>

<div id="home" class="hero">
    <div id="slideWrapper"></div>
    <div style="z-index: 10;">
        <h1>Thiết Bị Spa Chuyên Nghiệp</h1>
        <p>Máy mới - Thanh lý - Sửa chữa tận nơi</p>
    </div>
</div>

<div id="trietlong" class="section"><h2>Máy Triệt Lông</h2><div class="grid" id="grid-trietlong"></div></div>
<div id="laser" class="section"><h2>Laser Thẩm Mỹ</h2><div class="grid" id="grid-laser"></div></div>
<div id="giambeo" class="section"><h2>Máy Giảm Béo</h2><div class="grid" id="grid-giambeo"></div></div>
<div id="thanhly" class="section"><h2>Máy Thanh Lý</h2><div class="grid" id="grid-thanhly"></div></div>
<div id="suamay" class="section"><h2>Sửa Chữa & Bảo Trì</h2><div class="grid" id="grid-suamay"></div></div>

<div id="productDetail" class="detail-page">
    <button onclick="closeDetail()" style="margin-bottom:20px">⬅ Quay lại</button>
    <div style="background:white; padding:20px; border-radius:12px;">
        <img id="detailImg" style="width:100%; border-radius:10px;">
        <h2 id="detailTitle"></h2>
        <p class="price" id="detailPriceDisplay"></p>
        <p id="detailDesc" style="white-space: pre-line; line-height: 1.6;"></p>
    </div>
</div>

<div class="contact-buttons">
    <a href="tel:0900000000" class="btn-call">📞 Gọi điện</a>
    <a href="https://zalo.me/0900000000" class="btn-zalo">💬 Zalo</a>
</div>

<div id="adminPopup">
    <h3 style="text-align:center">Đăng máy mới</h3>
    <input type="file" id="upFile" accept="image/*">
    <input type="text" id="upTitle" placeholder="Tên máy...">
    <input type="text" id="upPrice" placeholder="Giá máy...">
    <select id="upCat">
        <option value="trietlong">Máy triệt lông</option>
        <option value="laser">Laser thẩm mỹ</option>
        <option value="giambeo">Máy giảm béo</option>
        <option value="thanhly">Máy thanh lý</option>
        <option value="suamay">Sửa chữa máy</option>
    </select>
    <textarea id="upDesc" rows="4" placeholder="Mô tả máy..."></textarea>
    <button style="width:100%; margin-top:15px; padding:15px; font-weight:bold" onclick="saveNewMachine()">ĐĂNG NGAY</button>
    <button style="width:100%; margin-top:5px; background:#666" onclick="document.getElementById('adminPopup').style.display='none'">Đóng</button>
</div>

<footer>
    <p>© <span onclick="document.getElementById('adminPopup').style.display='block'" style="cursor:pointer">2026</span> Thiết Bị Spa Minh Bảo</p>
</footer>

<script>
let slideIndex = 0;

window.onload = function() { refreshData(); };

function saveNewMachine() {
    const fileInput = document.getElementById('upFile');
    const title = document.getElementById('upTitle').value;
    const price = document.getElementById('upPrice').value || "Liên hệ";
    const cat = document.getElementById('upCat').value;
    const desc = document.getElementById('upDesc').value;

    if (!fileInput.files[0] || !title) { alert("Vui lòng chọn ảnh và nhập tên!"); return; }

    const reader = new FileReader();
    reader.onload = function(e) {
        const newProduct = { id: Date.now(), img: e.target.result, title, price, cat, desc };
        let data = JSON.parse(localStorage.getItem('minhbao_spa_v7') || '[]');
        data.push(newProduct);
        localStorage.setItem('minhbao_spa_v7', JSON.stringify(data));
        
        fileInput.value = "";
        document.getElementById('upTitle').value = "";
        document.getElementById('adminPopup').style.display = 'none';
        refreshData();
        alert("Đã đăng máy thành công!");
    };
    reader.readAsDataURL(fileInput.files[0]);
}

function refreshData() {
    const data = JSON.parse(localStorage.getItem('minhbao_spa_v7') || '[]');
    const cats = ['trietlong', 'laser', 'giambeo', 'thanhly', 'suamay'];
    cats.forEach(c => document.getElementById('grid-' + c).innerHTML = "");

    data.forEach(p => {
        const grid = document.getElementById('grid-' + p.cat);
        if(grid) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <button class="btn-del" onclick="deleteMachine(${p.id})">×</button>
                <img src="${p.img}">
                <h3>${p.title}</h3>
                <p class="price">Giá: ${p.price}</p>
                <button onclick="showDetail(${p.id})">Xem chi tiết</button>
            `;
            grid.prepend(card);
        }
    });

    // Slideshow lấy ảnh máy đã đăng
    const slideWrapper = document.getElementById('slideWrapper');
    slideWrapper.innerHTML = "";
    if(data.length > 0) {
        data.slice(-5).forEach(p => {
            const img = document.createElement('img');
            img.src = p.img;
            img.className = "slide-img";
            slideWrapper.appendChild(img);
        });
        startSlides();
    }
}

function startSlides() {
    let slides = document.getElementsByClassName("slide-img");
    if(slides.length == 0) return;
    for (let i = 0; i < slides.length; i++) slides[i].style.display = "none";
    slideIndex++;
    if (slideIndex > slides.length) slideIndex = 1;
    slides[slideIndex-1].style.display = "block";
    setTimeout(startSlides, 3000);
}

function deleteMachine(id) {
    if(confirm("Xóa máy này?")) {
        let data = JSON.parse(localStorage.getItem('minhbao_spa_v7') || '[]');
        data = data.filter(i => i.id !== id);
        localStorage.setItem('minhbao_spa_v7', JSON.stringify(data));
        refreshData();
    }
}

function showDetail(id) {
    const data = JSON.parse(localStorage.getItem('minhbao_spa_v7') || '[]');
    const p = data.find(i => i.id == id);
    if(p) {
        document.getElementById("detailImg").src = p.img;
        document.getElementById("detailTitle").innerText = p.title;
        document.getElementById("detailPriceDisplay").innerText = "Giá: " + p.price;
        document.getElementById("detailDesc").innerText = p.desc;
        document.querySelectorAll(".section, .hero").forEach(s => s.style.display = "none");
        document.getElementById("productDetail").style.display = "block";
        window.scrollTo(0,0);
    }
}

function closeDetail() {
    document.getElementById("productDetail").style.display = "none";
    document.querySelectorAll(".section, .hero").forEach(s => s.style.display = "block");
}
</script>

</body>
</html>
