<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiết Bị Spa Minh Bảo</title>

<style>
body{font-family:Arial;margin:0;background:#f4f6f8}
header{background:#0f172a;color:white;padding:20px}
header h2{margin:0}

nav{
margin-top:10px;
display:flex;
gap:20px;
align-items:center;
flex-wrap:wrap
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
display:flex;
align-items:center;
}

.menu-item{
position:relative;
display:flex;
align-items:center;
}

.dropdown{
position:absolute;
top:100%;
left:0;
background:white;
color:black;
border-radius:8px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
display:none;
min-width:180px;
padding-top:5px;
z-index:999;
}

.dropdown a{
display:block;
padding:10px 15px;
color:#111;
font-weight:normal
}

.dropdown a:hover{background:#f1f1f1}

@media(min-width:769px){
.menu-item:hover .dropdown{display:block}
}

@media(max-width:768px){
.dropdown{
position:static;
box-shadow:none;
margin-left:10px;
}
}

.hero{
background:linear-gradient(135deg,#111,#444);
color:white;
padding:80px 20px;
text-align:center
}

.hero h1{
font-size:36px;
margin-bottom:10px
}

button{
background:#e11d48;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer
}

.section{
padding:60px 20px;
max-width:1200px;
margin:auto
}

.section h2{
text-align:center;
margin-bottom:40px
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px
}

.card{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
transition:0.2s
}

.card img{width:100%;border-radius:8px}

.card:hover{transform:translateY(-5px)}

.price{
color:#e11d48;
font-weight:bold
}

footer{
background:#0f172a;
color:white;
text-align:center;
padding:30px;
margin-top:40px
}

.detail-page{
display:none;
padding:60px 20px;
max-width:1200px;
margin:auto
}

.detail-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.08)
}

.detail-img{
width:100%;
border-radius:10px
}
</style>
</head>

<body>

<header>
<h2>Minh Bảo - Thiết Bị Spa & Thẩm Mỹ</h2>

<nav>
<a href="#home">Trang chủ</a>

<div class="menu-item">
<a href="#trietlong">Máy triệt lông ▾</a>
<div class="dropdown">
<a href="#trietlong">IPL</a>
<a href="#trietlong">OPT</a>
<a href="#trietlong">Diode Laser</a>
<a href="#trietlong">SHR</a>
</div>
</div>

<a href="#lienhe">Liên hệ</a>
</nav>
</header>

<div id="home" class="hero">
<h1>Cung cấp thiết bị spa chuyên nghiệp</h1>
<p>Máy mới - Máy thanh lý - Bảo hành dài hạn</p>
</div>

<div id="trietlong" class="section">
<h2>Máy triệt lông</h2>
<div class="grid" id="productGrid">

<div class="card">
<h3>Máy Triệt Lông IPL</h3>
<p class="price">Giá: Liên hệ</p>
<button onclick="showDetail('IPL','Máy triệt lông spa','https://via.placeholder.com/600')">Xem</button>
</div>

</div>
</div>

<div id="productDetail" class="detail-page">
<button onclick="closeDetail()">⬅ Quay lại</button>
<div class="detail-grid">
<div>
<img id="detailImg" class="detail-img">
</div>
<div>
<h2 id="detailTitle"></h2>
<p class="price">Giá: Liên hệ</p>
<p id="detailDesc"></p>
</div>
</div>
</div>

<footer>
<p>© 2026 Thiết Bị Spa Minh Bảo</p>
</footer>

<!-- ADMIN ẨN -->
<div onclick="openAdmin()" style="position:fixed;bottom:5px;left:5px;width:20px;height:20px;opacity:0.05;"></div>

<div id="adminBox" style="display:none;position:fixed;bottom:20px;left:20px;background:white;padding:15px;border-radius:10px;width:260px;z-index:9999">

<h4>Admin</h4>

<input id="pass" type="password" placeholder="Mật khẩu" style="width:100%">
<button onclick="login()">Đăng nhập</button>

<div id="adminArea" style="display:none">

<input id="pname" placeholder="Tên máy" style="width:100%">
<input id="pprice" placeholder="Giá" style="width:100%">
<textarea id="pdesc" placeholder="Mô tả" style="width:100%"></textarea>
<input id="pimg" type="file">

<button onclick="addProduct()">Đăng</button>

</div>
</div>

<script>

const PASS="123456";

function openAdmin(){
document.getElementById("adminBox").style.display="block";
}

function login(){
if(document.getElementById("pass").value===PASS){
document.getElementById("adminArea").style.display="block";
}else{
alert("Sai mật khẩu");
}
}

function addProduct(){

let name=pname.value;
let price=pprice.value;
let desc=pdesc.value;
let file=pimg.files[0];

let reader=new FileReader();

reader.onload=function(e){

let product={
name,price,desc,img:e.target.result
};

let list=JSON.parse(localStorage.getItem("products")||"[]");
list.push(product);
localStorage.setItem("products",JSON.stringify(list));

render(product);

}

reader.readAsDataURL(file);
}

function render(p){
let grid=document.getElementById("productGrid");

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<img src="${p.img}">
<h3>${p.name}</h3>
<p class="price">${p.price}</p>
<button onclick="showDetail('${p.name}','${p.desc}','${p.img}')">Xem</button>
`;

grid.appendChild(div);
}

window.onload=function(){
let list=JSON.parse(localStorage.getItem("products")||"[]");
list.forEach(render);
}

function showDetail(t,d,i){
detailTitle.innerText=t;
detailDesc.innerText=d;
detailImg.src=i;

document.querySelectorAll(".section").forEach(s=>s.style.display="none");
document.querySelector(".hero").style.display="none";

productDetail.style.display="block";
}

function closeDetail(){
productDetail.style.display="none";
document.querySelectorAll(".section").forEach(s=>s.style.display="block");
document.querySelector(".hero").style.display="block";
}

</script>

</body>
</html>
