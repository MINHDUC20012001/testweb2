<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiết Bị Spa Minh Bảo</title>

<style>
body{font-family:Arial;margin:0;background:#f4f6f8}
header{background:#0f172a;color:white;padding:20px;position:relative;z-index:1001}
header h2{margin:0}

/* MENU */
nav{
margin-top:10px;
display:flex;
gap:20px;
align-items:center;
flex-wrap:wrap
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
display:flex;
align-items:center;
}

/* MENU ITEM */
.menu-item{
position:relative;
display:flex;
align-items:center;
}

/* 🔥 OVERLAY CHE NỀN */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.25); /* mờ nền */
display:none;
z-index:999;
}

/* DROPDOWN */
.dropdown{
position:absolute;
top:100%;
left:0;
background:#fff;
border-radius:10px;
box-shadow:0 15px 30px rgba(0,0,0,0.3);
display:none;
min-width:180px;
padding-top:5px;
z-index:1002;
}

.dropdown a{
display:block;
padding:12px 15px;
color:#111;
font-weight:normal
}

.dropdown a:hover{background:#f1f1f1}

/* HERO */
.hero{
background:linear-gradient(135deg,#111,#444);
color:white;
padding:80px 20px;
text-align:center
}

.hero h1{
font-size:36px;
margin-bottom:10px
}

button{
background:#e11d48;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer
}

/* SECTION */
.section{
padding:60px 20px;
max-width:1200px;
margin:auto
}

.section h2{
text-align:center;
margin-bottom:40px
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px
}

.card{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

.price{
color:#e11d48;
font-weight:bold
}

/* DETAIL */
.detail-page{
display:none;
padding:60px 20px;
max-width:1200px;
margin:auto
}

.detail-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
background:white;
padding:30px;
border-radius:12px;
}

.detail-img{
width:100%;
border-radius:10px
}

</style>
</head>

<body>

<!-- 🔥 LỚP CHE -->
<div id="overlay" class="overlay" onclick="closeAll()"></div>

<header>
<h2>Minh Bảo - Thiết Bị Spa & Thẩm Mỹ</h2>

<nav>
<a href="#home">Trang chủ</a>

<div class="menu-item" onmouseenter="openMenu(this)" onmouseleave="closeMenu(this)">
<a href="#trietlong">Máy triệt lông ▾</a>
<div class="dropdown">
<a href="#trietlong">IPL</a>
<a href="#trietlong">OPT</a>
<a href="#trietlong">Diode Laser</a>
<a href="#trietlong">SHR</a>
</div>
</div>

<div class="menu-item" onmouseenter="openMenu(this)" onmouseleave="closeMenu(this)">
<a href="#laser">Laser thẩm mỹ ▾</a>
<div class="dropdown">
<a href="#laser">Q-Switch ND YAG</a>
<a href="#laser">CO2 Fractional</a>
<a href="#laser">Laser Pico</a>
<a href="#laser">Laser trị nám</a>
</div>
</div>

<a href="#lienhe">Liên hệ</a>

</nav>
</header>

<!-- HERO -->
<div id="home" class="hero">
<h1>Cung cấp thiết bị spa chuyên nghiệp</h1>
<p>Máy mới - Máy thanh lý 90-98% - Bảo hành dài hạn</p>
</div>

<!-- SECTION -->
<div id="trietlong" class="section">
<h2>Máy triệt lông</h2>
<div class="grid">
<div class="card">
<h3>Diode Laser</h3>
<p class="price">Giá: Liên hệ</p>
</div>
</div>
</div>

<!-- SCRIPT -->
<script>

function openMenu(el){
el.querySelector(".dropdown").style.display="block";
document.getElementById("overlay").style.display="block";
}

function closeMenu(el){
el.querySelector(".dropdown").style.display="none";
document.getElementById("overlay").style.display="none";
}

function closeAll(){
document.querySelectorAll(".dropdown").forEach(d=>d.style.display="none");
document.getElementById("overlay").style.display="none";
}

</script>

</body>
</html>
