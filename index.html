<script type="module">
// ===== FIREBASE =====
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-analytics.js";

// ⚠️ CONFIG CỦA BẠN

  apiKey: "AIzaSyB8ohI0dWkrg8UtsrCkgo6",
  authDomain: "thietbispaminhbao.firebaseapp.com",
  projectId: "thietbispaminhbao",
  storageBucket: "thietbispaminhbao.firebasestorage.app",
  messagingSenderId: "68467226",
  appId: "1:684672295846:web:c6927db0a76d28",

};

// Khởi tạo Firebase

const analytics = getAnalytics(app);

console.log("🔥 Firebase đã kết nối OK");

// ===== CODE WEB CỦA BẠN (ĐÃ FIX) =====

const dbName = "MinhBao_Final_V10"; 
const storeName = "items";

function openDB() { 
    return new Promise((resolve) => { 
        const req = indexedDB.open(dbName, 1); 
        req.onupgradeneeded = (e) => e.target.result.createObjectStore(storeName, { keyPath: "id" }); 
        req.onsuccess = (e) => resolve(e.target.result); 
    }); 
}

async function saveTest() {
    const db = await openDB();
    db.transaction(storeName,"readwrite").objectStore(storeName).add({
        id: Date.now(),
        title: "Test máy triệt lông",
        price: "20.000.000 VNĐ",
        imgs: ["https://via.placeholder.com/300"],
        cat: "triet-long",
        desc: "Máy test Firebase + Web OK"
    }).onsuccess = () => alert("✅ Lưu OK");
}

async function loadData() {
    const db = await openDB();

    db.transaction(storeName).objectStore(storeName).getAll().onsuccess = (e) => {
        console.log("DATA:", e.target.result);
    };
}

window.onload = loadData;
</script>

<button onclick="saveTest()">➕ Test lưu dữ liệu</button>
