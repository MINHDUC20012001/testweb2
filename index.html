<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiết Bị Spa Minh Bảo</title>

<style>
body{font-family:Arial;margin:0;background:#f4f6f8}

/* HEADER */
header{background:#0f172a;color:white;padding:15px}
header h2{margin:0;font-size:18px}

/* MENU */
.menu-toggle{display:none;font-size:22px;cursor:pointer}

nav{display:flex;gap:15px;margin-top:10px;flex-wrap:wrap}
nav a{color:white;text-decoration:none;font-weight:bold;font-size:14px}

/* MOBILE MENU */
@media(max-width:768px){
nav{display:none;flex-direction:column}
nav.active{display:flex}
.menu-toggle{display:block}
}

/* HERO */
.hero{background:linear-gradient(135deg,#111,#444);color:white;padding:60px 20px;text-align:center}
.hero h1{font-size:24px}

/* BUTTON */
button{background:#e11d48;color:white;border:none;padding:10px 15px;border-radius:6px}

/* SECTION */
.section{padding:40px 15px}
.section h2{text-align:center;margin-bottom:20px}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:15px}

/* CARD */
.card{background:white;border-radius:10px;padding:15px;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
.card img{width:100%;border-radius:8px}
.price{color:#e11d48;font-weight:bold}

/* DETAIL */
.detail-page{display:none;padding:20px}
.detail-box{background:white;padding:20px;border-radius:10px}
.detail-img{width:100%;border-radius:10px}

/* CONTACT */
.contact-box{background:white;padding:20px;border-radius:10px}

/* FLOAT BUTTON */
.float-btn{position:fixed;right:15px;bottom:15px;display:flex;flex-direction:column;gap:10px}
.float-btn div{padding:10px 14px;border-radius:30px;color:white;font-weight:bold}
.zalo{background:#0068ff}
.call{background:#16a34a}

</style>
</head>

<body>

<header>
<h2>Minh Bảo - Thiết Bị Spa</h2>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<nav id="menu">
<a href="#home">Trang chủ</a>
<a href="#trietlong">Triệt lông</a>
<a href="#laser">Laser</a>
<a href="#giambeo">Giảm béo</a>
<a href="#suamay">Sửa máy</a>
<a href="#lienhe">Liên hệ</a>
</nav>
</header>

<!-- HERO -->
<div id="home" class="hero">
<h1>Thiết bị spa chuyên nghiệp</h1>
<p>Máy mới - Thanh lý - Bảo hành dài</p>
<button onclick="scrollToContact()">Liên hệ ngay</button>
</div>

<!-- TRIET LONG -->
<div id="trietlong" class="section">
<h2>Máy triệt lông</h2>
<div class="grid">

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Diode Laser</h3>
<p class="price">Giá: Liên hệ</p>
<button onclick="showDetail('Diode Laser','Máy triệt lông cao cấp','https://via.placeholder.com/600')">Xem</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>IPL</h3>
<p class="price">Giá: Liên hệ</p>
<button onclick="showDetail('IPL','Máy triệt lông spa','https://via.placeholder.com/600')">Xem</button>
</div>

</div>
</div>

<!-- LASER -->
<div id="laser" class="section">
<h2>Laser thẩm mỹ</h2>
<div class="grid">

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Q-Switch</h3>
<p class="price">Giá: Liên hệ</p>
<button onclick="showDetail('Q-Switch','Xóa xăm trị nám','https://via.placeholder.com/600')">Xem</button>
</div>

</div>
</div>

<!-- LIEN HE -->
<div id="lienhe" class="section">
<h2>Liên hệ</h2>
<div class="contact-box">
<p><b>Minh Bảo Spa</b></p>
<p>📞 0929.524.048</p>
</div>
</div>

<!-- DETAIL -->
<div id="detail" class="detail-page">
<button onclick="closeDetail()">⬅ Quay lại</button>

<div class="detail-box">
<img id="dimg" class="detail-img">
<h2 id="dtitle"></h2>
<p id="ddesc"></p>
<button onclick="chat()">Chat Zalo</button>
</div>

</div>

<!-- FLOAT -->
<div class="float-btn">
<a href="https://zalo.me/0929524048"><div class="zalo">💬 Zalo</div></a>
<a href="tel:0929524048"><div class="call">📞 Gọi</div></a>
</div>

<script>

function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

function scrollToContact(){
document.getElementById("lienhe").scrollIntoView();
}

function showDetail(t,d,i){
document.getElementById("dtitle").innerText=t;
document.getElementById("ddesc").innerText=d;
document.getElementById("dimg").src=i;

document.querySelectorAll(".section").forEach(e=>e.style.display="none");
document.querySelector(".hero").style.display="none";

document.getElementById("detail").style.display="block";
window.scrollTo(0,0);
}

function closeDetail(){
document.getElementById("detail").style.display="none";
document.querySelectorAll(".section").forEach(e=>e.style.display="block");
document.querySelector(".hero").style.display="block";
}

function chat(){
window.open("https://zalo.me/0929524048");
}

</script>

</body>
</html>
