<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiết Bị Spa Minh Bảo</title>

<style>
body{font-family:Arial;margin:0;background:#f4f6f8}
header{background:#0f172a;color:white;padding:15px}
header h2{margin:0;font-size:18px}

/* MENU */
nav{
margin-top:10px;
display:flex;
gap:15px;
align-items:center;
flex-wrap:wrap
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
display:flex;
align-items:center;
font-size:14px
}

.menu-item{
position:relative;
display:flex;
align-items:center;
}

/* DROPDOWN */
.dropdown{
position:absolute;
top:100%;
left:0;
background:white;
color:black;
border-radius:8px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
display:none;
min-width:160px;
z-index:10;
}

.dropdown a{
display:block;
padding:10px 15px;
color:#111;
font-weight:normal;
font-size:14px
}

.dropdown a:hover{background:#f1f1f1}
.menu-item:hover .dropdown{display:block}

/* HERO */
.hero{
background:linear-gradient(135deg,#111,#444);
color:white;
padding:60px 15px;
text-align:center
}

.hero h1{
font-size:24px;
margin-bottom:10px
}

/* BUTTON */
button{
background:#e11d48;
color:white;
border:none;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
font-size:14px
}

/* SECTION */
.section{
padding:40px 15px;
max-width:1200px;
margin:auto
}

.section h2{
text-align:center;
margin-bottom:25px;
font-size:20px
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px
}

/* CARD */
.card{
background:white;
border-radius:12px;
padding:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
transition:0.2s
}

.card:hover{transform:none}

.price{
color:#e11d48;
font-weight:bold
}

/* SERVICE */
.service{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 6px 15px rgba(0,0,0,0.08)
}

/* FOOTER */
footer{
background:#0f172a;
color:white;
text-align:center;
padding:20px;
margin-top:30px;
font-size:14px
}

/* CONTACT */
.contact-box{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.08)
}

/* FORM */
input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px
}

form button{margin-top:10px}

/* DETAIL */
.detail-page{
display:none;
padding:30px 15px;
max-width:1200px;
margin:auto
}

.detail-grid{
display:grid;
grid-template-columns:1fr;
gap:20px;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.08)
}

.detail-img{
width:100%;
border-radius:10px
}

/* ===== MOBILE FIX ===== */
@media (max-width:768px){

nav{
flex-direction:row;
overflow-x:auto;
white-space:nowrap;
}

.menu-item{
flex-shrink:0;
}

.hero h1{
font-size:22px;
}

button{
width:100%;
}

.detail-grid{
grid-template-columns:1fr;
}

}
</style>
