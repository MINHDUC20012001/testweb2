<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiết Bị Spa Minh Bảo</title>

<style>
body{font-family:Arial;margin:0;background:#f4f6f8}
header{background:#0f172a;color:white;padding:15px}
header h2{margin:0;font-size:18px}

/* MENU */
nav{
margin-top:10px;
display:flex;
gap:15px;
align-items:center;
overflow-x:auto;
white-space:nowrap;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
font-size:14px;
}

/* FIX LỆCH */
.menu-item{
position:relative;
display:flex;
align-items:center;
}

/* DROPDOWN */
.dropdown{
position:absolute;
top:100%;
left:0;
background:white;
color:black;
border-radius:8px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
display:none;
min-width:180px;
z-index:999;
}

.dropdown a{
display:block;
padding:10px;
color:#111;
font-weight:normal
}

.dropdown a:hover{background:#f1f1f1}

/* PC hover */
@media(min-width:769px){
.menu-item:hover .dropdown{display:block}
}

/* MOBILE dropdown */
@media(max-width:768px){
.dropdown{
position:static;
box-shadow:none;
margin-left:10px;
}
}

/* HERO */
.hero{
background:linear-gradient(135deg,#111,#444);
color:white;
padding:50px 15px;
text-align:center
}

.hero h1{
font-size:22px;
margin-bottom:10px
}

/* BUTTON */
button{
background:#e11d48;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer
}

/* SECTION */
.section{
padding:40px 15px;
max-width:1200px;
margin:auto
}

.section h2{
text-align:center;
margin-bottom:20px;
font-size:20px
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px
}

/* CARD */
.card{
background:white;
border-radius:10px;
padding:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.1)
}

.card h3{
font-size:14px;
}

.price{
color:#e11d48;
font-weight:bold;
font-size:14px
}

/* DETAIL */
.detail-page{
display:none;
padding:20px
}

.detail-grid{
display:grid;
grid-template-columns:1fr;
gap:20px;
background:white;
padding:20px;
border-radius:10px
}

.detail-img{
width:100%;
border-radius:10px
}

/* PC DETAIL */
@media(min-width:769px){
.detail-grid{
grid-template-columns:1fr 1fr;
}
}

/* FOOTER */
footer{
background:#0f172a;
color:white;
text-align:center;
padding:20px;
margin-top:30px;
font-size:14px
}

</style>
</head>

<body>

<header>
<h2>Minh Bảo - Thiết Bị Spa</h2>

<nav>
<a href="#home">Trang chủ</a>

<div class="menu-item">
<a href="#trietlong">Triệt lông ▾</a>
<div class="dropdown">
<a href="#trietlong">IPL</a>
<a href="#trietlong">OPT</a>
<a href="#trietlong">Diode</a>
<a href="#trietlong">SHR</a>
</div>
</div>

<div class="menu-item">
<a href="#laser">Laser ▾</a>
<div class="dropdown">
<a href="#laser">Q-Switch</a>
<a href="#laser">CO2</a>
<a href="#laser">Pico</a>
</div>
</div>

<a href="#lienhe">Liên hệ</a>
</nav>
</header>

<!-- HERO -->
<div id="home" class="hero">
<h1>Thiết bị spa chuyên nghiệp</h1>
<p>Máy mới - Thanh lý - Bảo hành dài</p>
</div>

<!-- TRIET LONG -->
<div id="trietlong" class="section">
<h2>Máy triệt lông</h2>
<div class="grid">

<div class="card">
<h3>Diode Laser 808nm</h3>
<p class="price">Giá: Liên hệ</p>
<button onclick="showDetail('Diode Laser 808nm','Máy cao cấp','https://via.placeholder.com/600')">Xem</button>
</div>

<div class="card">
<h3>IPL</h3>
<p class="price">Giá: Liên hệ</p>
<button onclick="showDetail('IPL','Dành cho spa mới','https://via.placeholder.com/600')">Xem</button>
</div>

</div>
</div>

<!-- DETAIL -->
<div id="productDetail" class="detail-page">
<button onclick="closeDetail()">⬅ Quay lại</button>

<div class="detail-grid">
<img id="detailImg" class="detail-img">

<div>
<h2 id="detailTitle"></h2>
<p class="price">Giá: Liên hệ</p>
<p id="detailDesc"></p>
</div>
</div>
</div>

<footer>
<p>© 2026 Minh Bảo Spa</p>
</footer>

<script>
function showDetail(title,desc,img){
document.getElementById("detailTitle").innerText=title;
document.getElementById("detailDesc").innerText=desc;
document.getElementById("detailImg").src=img;

document.querySelectorAll(".section").forEach(s=>s.style.display="none");
document.querySelector(".hero").style.display="none";

document.getElementById("productDetail").style.display="block";
window.scrollTo(0,0);
}

function closeDetail(){
document.getElementById("productDetail").style.display="none";
document.querySelectorAll(".section").forEach(s=>s.style.display="block");
document.querySelector(".hero").style.display="block";
}
</script>

</body>
</html>
